<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Aether — zaawansowana platforma cyfrowa: dashboard, portfolio, blog i interaktywne doświadczenia web."
    />
    <meta name="theme-color" content="#0a0b14" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <title>Aether — Advanced Digital Platform</title>
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('aether-theme')
          var theme =
            stored === 'light' || stored === 'dark'
              ? stored
              : window.matchMedia('(prefers-color-scheme: light)').matches
                ? 'light'
                : 'dark'
          document.documentElement.classList.add(theme)
          var meta = document.querySelector('meta[name="theme-color"]')
          if (meta) meta.setAttribute('content', theme === 'dark' ? '#0a0b14' : '#f8fafc')
        } catch (e) {
          document.documentElement.classList.add('dark')
        }
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
